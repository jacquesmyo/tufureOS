version: "3.8"

services:
  tufureos:
    build: .
    container_name: tufureos-trader
    restart: unless-stopped
    environment:
      - LIVE_MODE=0
      - PYTHONPATH=/app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - tufureos-net

  # Optional: Prometheus + Grafana for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: tufureos-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - tufureos-net

  grafana:
    image: grafana/grafana:latest
    container_name: tufureos-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - tufureos-net

volumes:
  grafana-storage:

networks:
  tufureos-net:
    driver: bridge
